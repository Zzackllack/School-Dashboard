version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: school-dashboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-school_dashboard}"
      POSTGRES_USER: "${POSTGRES_USER:-school_dashboard}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-school_dashboard} -d ${POSTGRES_DB:-school_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  backend:
    build:
      context: ..
      dockerfile: Docker/backend.Dockerfile
    container_name: school-dashboard-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Provide credentials at runtime (e.g. via .env or secrets)
      # DSB_USERNAME and DSB_PASSWORD override values in application.properties
      # - DSB_USERNAME=your-user
      # - DSB_PASSWORD=your-pass
      SERVER_SERVLET_SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-false}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB:-school_dashboard}"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER:-school_dashboard}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:-change-me}"
      SPRING_FLYWAY_LOCATIONS: "classpath:db/migration/postgresql"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network

  frontend:
    build:
      context: ..
      dockerfile: Docker/frontend.Dockerfile
    container_name: school-dashboard-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "80:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch(`http://127.0.0.1:${process.env.PORT || 3000}`).then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
