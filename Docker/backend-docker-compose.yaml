version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: Docker/backend.Dockerfile
    container_name: school-dashboard-backend
    restart: unless-stopped
    environment:
      SERVER_SERVLET_SESSION_COOKIE_SECURE: "true"
      SPRING_DATASOURCE_URL: "${SPRING_DATASOURCE_URL:-jdbc:postgresql://db.example.com:5432/school_dashboard}"
      SPRING_DATASOURCE_USERNAME: "${SPRING_DATASOURCE_USERNAME:-school_dashboard}"
      SPRING_DATASOURCE_PASSWORD: "${SPRING_DATASOURCE_PASSWORD:-change-me}"
      SPRING_FLYWAY_LOCATIONS: "classpath:db/migration/postgresql"
      # Uncomment and supply credentials for production use
      # DSB_USERNAME: your-user
      # DSB_PASSWORD: your-pass
    # ports: - Uncomment to expose the backend service (not needed if using a reverse proxy)
    #  - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
