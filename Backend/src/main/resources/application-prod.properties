security.admin.bootstrap.enabled=false

# Production must use HTTPS-only session cookies
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# Set via environment variable for explicit origin allowlist
security.cors.allowed-origins=${SECURITY_CORS_ALLOWED_ORIGINS:}

# Keep actuator surface minimal in production
management.endpoints.web.exposure.include=health,info
