server.port=${SERVER_PORT:8080}

# Local env file support (optional)
spring.config.import=optional:file:./.env[.properties]

# DSB / calendar configuration
dsb.username=${DSB_USERNAME:}
dsb.password=${DSB_PASSWORD:}
calendar.ics-url=${CALENDAR_ICS_URL:}

# Data source / JPA
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/substitution-plans;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# Flyway
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=${SPRING_FLYWAY_LOCATIONS:classpath:db/migration/h2}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}

# Session and cookie settings
security.session.idle-timeout=${SECURITY_SESSION_IDLE_TIMEOUT:30m}
server.servlet.session.timeout=${SERVER_SERVLET_SESSION_TIMEOUT:${security.session.idle-timeout}}
server.servlet.session.cookie.http-only=${SERVER_SERVLET_SESSION_COOKIE_HTTP_ONLY:true}
server.servlet.session.cookie.same-site=${SERVER_SERVLET_SESSION_COOKIE_SAME_SITE:lax}
server.servlet.session.cookie.secure=${SERVER_SERVLET_SESSION_COOKIE_SECURE:true}

# Admin bootstrap controls
security.admin.bootstrap.enabled=${SECURITY_ADMIN_BOOTSTRAP_ENABLED:false}
security.admin.bootstrap.username=${SECURITY_ADMIN_BOOTSTRAP_USERNAME:}
security.admin.bootstrap.password=${SECURITY_ADMIN_BOOTSTRAP_PASSWORD:}

# CORS allowlist
security.cors.allowed-origins=${SECURITY_CORS_ALLOWED_ORIGINS:}

# Actuator exposure
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
