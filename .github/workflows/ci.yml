name: CI

on:
  pull_request:
  workflow_run:
    workflows: ["Auto Format"]
    types: [completed]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    if: (github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.actor.login != 'dependabot[bot]')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Format check
        run: mvn -f Backend/pom.xml spotless:check

      - name: Run tests
        run: mvn -f Backend/pom.xml test

      - name: Package
        run: mvn -f Backend/pom.xml -DskipTests package

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    if: (github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.actor.login != 'dependabot[bot]')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm --dir Frontend run format:check

      - name: Lint
        run: pnpm --dir Frontend run lint

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser
        run: pnpm --dir Frontend exec playwright install --with-deps chromium

      - name: Unit tests
        run: pnpm --dir Frontend run test:unit

      - name: Integration tests
        run: pnpm --dir Frontend run test:integration

      - name: Web tests
        run: pnpm --dir Frontend run test:web
